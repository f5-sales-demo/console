schema: urn:f5xc:console:workflow:v1
id: network-policy-rule-create
label: Create Network Policy Rules
resource: network-policy-rule
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Network Policy Rules name (lowercase alphanumeric and hyphens)
    example: example-network-policy-rule
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/distributed-apps/namespaces/{namespace}/manage/network_policies/network_policy_rules
    wait_for: text('Network Policy Rules')
    description: Navigate to Network Policy Rules list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Network Policy Rule')
    wait_for: textbox[name='Name']
    description: Click the Add Network Policy Rule tab to open the create form
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
