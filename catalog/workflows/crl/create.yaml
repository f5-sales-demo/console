schema: urn:f5xc:console:workflow:v1
id: crl-create
label: Create Certificate Revocation List
resource: crl
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Certificate Revocation List name (lowercase alphanumeric and hyphens)
    example: example-crl
  crl_server_address:
    required: true
    description: CRL Server address
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/load_balancers/crl
    wait_for: text('Certificate Revocation List')
    description: Navigate to Certificate Revocation List list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add CRL')
    wait_for: textbox[name='Name']
    description: Click the Add CRL tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: fill-crl_server_address
    action: fill
    selector: textbox[name='CRL Server address']
    value: "{crl_server_address}"
    description: Enter CRL Server address
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
