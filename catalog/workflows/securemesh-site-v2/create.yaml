schema: urn:f5xc:console:workflow:v1
id: securemesh-site-v2-create
label: Create Secure Mesh Sites v2
resource: securemesh-site-v2
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Secure Mesh Sites v2 name (lowercase alphanumeric and hyphens)
    example: example-securemesh-site-v2
  provider_name:
    required: false
    description: Provider Name
    default: VMWare
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/site_management/cloud_sites/securemesh_site_v2
    wait_for: text('Secure Mesh Sites v2')
    description: Navigate to Secure Mesh Sites v2 list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Secure Mesh Site v2')
    wait_for: textbox[name='Name']
    description: Click the Add Secure Mesh Site v2 tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-provider_name
    action: select
    selector: listbox
    context: Provider Name section
    value: "{provider_name}"
    description: Select Provider Name
    condition: params.provider_name is set
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
