schema: urn:f5xc:console:workflow:v1
id: certificate-create
label: Create TLS Certificates
resource: certificate
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: TLS Certificates name (lowercase alphanumeric and hyphens)
    example: example-certificate
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/certificate_management/tls_certificate
    wait_for: text('TLS Certificates')
    description: Navigate to TLS Certificates list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add TLS Certificate')
    wait_for: textbox[name='Name']
    description: Click the Add TLS Certificate tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
