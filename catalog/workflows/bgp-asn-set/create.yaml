schema: urn:f5xc:console:workflow:v1
id: bgp-asn-set-create
label: Create BGP ASN Sets
resource: bgp-asn-set
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: BGP ASN Sets name (lowercase alphanumeric and hyphens)
    example: example-bgp-asn-set
  as_numbers:
    required: true
    description: "'Field AS Numbers in Spec is required' — minimum 1 item"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/shared_objects/bgp_asn_sets
    wait_for: text('BGP ASN Sets')
    description: Navigate to BGP ASN Sets list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add BGP ASN Set')
    wait_for: textbox[name='Name']
    description: Click the Add BGP ASN Set tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: add-as_numbers
    action: click
    selector: button:text('Add Item')
    context: AS Numbers section
    description: Add AS Numbers entry
    then:
      - id: fill-as_numbers-value
        action: fill
        selector: textbox
        value: "{as_numbers}"
        description: Fill the first required field in the AS Numbers sub-form (the agent should provide a value via the
          'as_numbers' parameter)
      - id: apply-as_numbers
        action: click
        selector: button:text('Apply')
        description: Confirm AS Numbers entry
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
