schema: urn:f5xc:console:workflow:v1
id: policer-create
label: Create Policers
resource: policer
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Policers name (lowercase alphanumeric and hyphens)
    example: example-policer
  committed_information_rate:
    required: false
    description: Committed Information Rate
    default: 0
  burst_size:
    required: false
    description: Burst Size
    default: 0
  policer_rules:
    required: true
    description: "'We found 2 errors' — needs policer rules + burst_size"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/firewall/policers
    wait_for: text('Policers')
    description: Navigate to Policers list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Policer')
    wait_for: textbox[name='Name']
    description: Click the Add Policer tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: fill-committed_information_rate
    action: fill
    selector: spinbutton[name='Committed Information Rate']
    value: "{committed_information_rate}"
    description: Set Committed Information Rate
  - id: fill-burst_size
    action: fill
    selector: spinbutton[name='Burst Size']
    value: "{burst_size}"
    description: Set Burst Size
  - id: add-policer_rules
    action: click
    selector: button:text('Add Item')
    context: Policer Rules section
    description: Add Policer Rules entry
    then:
      - id: apply-policer_rules
        action: click
        selector: button:text('Apply')
        description: Confirm Policer Rules entry
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
