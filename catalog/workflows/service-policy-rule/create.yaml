schema: urn:f5xc:console:workflow:v1
id: service-policy-rule-create
label: Create Service Policy Rules
resource: service-policy-rule
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Service Policy Rules name (lowercase alphanumeric and hyphens)
    example: example-service-policy-rule
  waf_action:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/service_policies/service_policy_rules
    wait_for: text('Service Policy Rules')
    description: Navigate to Service Policy Rules list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Service Policy Rule')
    wait_for: textbox[name='Name']
    description: Click the Add Service Policy Rule tab to open the create form
  - id: configure-waf_action
    action: click
    selector: button:text('Configure')
    context: Waf Action section
    description: Open the Waf Action configuration (required field). The sub-form must be filled for save to succeed.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
