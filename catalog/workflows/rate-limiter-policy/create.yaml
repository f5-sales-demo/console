schema: urn:f5xc:console:workflow:v1
id: rate-limiter-policy-create
label: Create Rate Limiter Policies
resource: rate-limiter-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Rate Limiter Policies name (lowercase alphanumeric and hyphens)
    example: example-rate-limiter-policy
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/rate_limiter_policies
    wait_for: text('Rate Limiter Policies')
    description: Navigate to Rate Limiter Policies list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Rate Limiter')
    wait_for: textbox[name='Name']
    description: Click the Add Rate Limiter tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
