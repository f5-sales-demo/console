    action: navigate
    url: /web/workspaces/dns-management/manage/dns_lb_management/dns_lb_pool
    wait_for: text('DNS Load Balancer Pools')
    description: Navigate to DNS Load Balancer Pools list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add DNS Load Balancer Pool')
    wait_for: textbox[name='Name']
    description: Click the Add DNS Load Balancer Pool tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
