schema: urn:f5xc:console:workflow:v1
id: tunnel-create
label: Create Tunnels
resource: tunnel
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Tunnels name (lowercase alphanumeric and hyphens)
    example: example-tunnel
  tunnel_type:
    required: true
    description: Tunnel Type
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/legacy_network_configuration/tunnels
    wait_for: text('Tunnels')
    description: Navigate to Tunnels list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Tunnel')
    wait_for: textbox[name='Name']
    description: Click the Add Tunnel tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-tunnel_type
    action: select
    selector: listbox
    context: Tunnel Type section
    value: "{tunnel_type}"
    description: Select Tunnel Type
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
