schema: urn:f5xc:console:workflow:v1
id: nat-policy-create
label: Create NAT Policies
resource: nat-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: NAT Policies name (lowercase alphanumeric and hyphens)
    example: example-nat-policy
  applies_to:
    required: false
    description: Applies To
    default: Site
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/network_configuration/nat_policy
    wait_for: text('NAT Policies')
    description: Navigate to NAT Policies list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add NAT Policy')
    wait_for: textbox[name='Name']
    description: Click the Add NAT Policy tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-applies_to
    action: select
    selector: listbox
    context: Applies To section
    value: "{applies_to}"
    description: Select Applies To
    condition: params.applies_to is set
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
