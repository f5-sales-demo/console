schema: urn:f5xc:console:workflow:v1
id: data-type-create
label: Create Data Types
resource: data-type
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Data Types name (lowercase alphanumeric and hyphens)
    example: example-data-type
  data_type_rules:
    required: true
    description: "Server-required: Minimum items of 1"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/api_security/data_types
    wait_for: text('Data Types')
    description: Navigate to Data Types list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Data Type')
    wait_for: textbox[name='Name']
    description: Click the Add Data Type tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-data_type_rules
    action: click
    selector: button:text('Configure')
    context: Data Type Rules section
    description: Open the Data Type Rules configuration (required field). The sub-form must be filled for save to succeed.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
