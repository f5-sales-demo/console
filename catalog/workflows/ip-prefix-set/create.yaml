schema: urn:f5xc:console:workflow:v1
id: ip-prefix-set-create
label: Create IP Prefix Sets
resource: ip-prefix-set
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: IP Prefix Sets name (lowercase alphanumeric and hyphens)
    example: example-ip-prefix-set
  prefix:
    required: true
    description: "Server-required: At least one IP prefix required"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/shared_objects/ip_prefix_sets
    wait_for: text('IP Prefix Sets')
    description: Navigate to IP Prefix Sets list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add IP Prefix Set')
    wait_for: textbox[name='Name']
    description: Click the Add IP Prefix Set tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-prefix
    action: click
    selector: button:text('Configure')
    context: Prefix section
    description: Open the Prefix configuration (required)
  - id: fill-prefix-value
    action: fill
    selector: textbox
    value: "{prefix}"
    description: Fill the required field inside the Prefix configuration. The agent provides this via the 'prefix' parameter.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
