schema: urn:f5xc:console:workflow:v1
id: protocol-policer-create
label: Create Protocol Policers
resource: protocol-policer
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Protocol Policers name (lowercase alphanumeric and hyphens)
    example: example-protocol-policer
  protocol_policer:
    required: true
    description: At least one protocol policer entry required. Uses Add Item sub-form, not a datatable input.
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/firewall/protocol_policers
    wait_for: text('Protocol Policers')
    description: Navigate to Protocol Policers list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Protocol Policer')
    wait_for: textbox[name='Name']
    description: Click the Add Protocol Policer tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: add-protocol_policer
    action: click
    selector: button:text('Add Item')
    context: Protocol Policer section
    description: Add Protocol Policer entry
    then:
      - id: fill-protocol_policer-value
        action: fill
        selector: textbox
        value: "{protocol_policer}"
        description: Fill the first required field in the Protocol Policer sub-form (the agent should provide a value via the
          'protocol_policer' parameter)
      - id: apply-protocol_policer
        action: click
        selector: button:text('Apply')
        description: Confirm Protocol Policer entry
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
