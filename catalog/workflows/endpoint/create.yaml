schema: urn:f5xc:console:workflow:v1
id: endpoint-create
label: Create Endpoints
resource: endpoint
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Endpoints name (lowercase alphanumeric and hyphens)
    example: example-endpoint
  virtual_site_or_site_or_network:
    required: false
    description: Virtual-Site or Site or Network
    default: Virtual Site
  reference:
    required: true
    description: Reference
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/virtual_host/endpoints
    wait_for: text('Endpoints')
    description: Navigate to Endpoints list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Endpoint')
    wait_for: textbox[name='Name']
    description: Click the Add Endpoint tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-virtual_site_or_site_or_network
    action: select
    selector: listbox
    context: Virtual-Site or Site or Network section
    value: "{virtual_site_or_site_or_network}"
    description: Select Virtual-Site or Site or Network
    condition: params.virtual_site_or_site_or_network is set
  - id: select-reference
    action: select
    selector: listbox
    context: Reference section
    value: "{reference}"
    description: Select Reference
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
