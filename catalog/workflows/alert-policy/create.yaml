schema: urn:f5xc:console:workflow:v1
id: alert-policy-create
label: Create Alert Policies
resource: alert-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Alert Policies name (lowercase alphanumeric and hyphens)
    example: example-alert-policy
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/shared-configuration/namespaces/shared/manage/alert_policies
    wait_for: text('Alert Policies')
    description: Navigate to Alert Policies list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Alert Policy')
    wait_for: textbox[name='Name']
    description: Click the Add Alert Policy tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
