schema: urn:f5xc:console:workflow:v1
id: bgp-create
label: Create BGP Peers & Policies
resource: bgp
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: BGP Peers & Policies name (lowercase alphanumeric and hyphens)
    example: example-bgp
  where:
    required: false
    description: Where
    default: Site
  reference:
    required: true
    description: Reference
  asn:
    required: false
    description: ASN
    default: 0
  router_id:
    required: false
    description: Router ID
    default: From Interface Address
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/external_connectivity/bgp
    wait_for: text('BGP Peers & Policies')
    description: Navigate to BGP Peers & Policies list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add BGP')
    wait_for: textbox[name='Name']
    description: Click the Add BGP tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-where
    action: select
    selector: listbox
    context: Where section
    value: "{where}"
    description: Select Where
    condition: params.where is set
  - id: select-reference
    action: select
    selector: listbox
    context: Reference section
    value: "{reference}"
    description: Select Reference
  - id: fill-asn
    action: fill
    selector: spinbutton[name='ASN']
    value: "{asn}"
    description: Set ASN
  - id: select-router_id
    action: select
    selector: listbox
    context: Router ID section
    value: "{router_id}"
    description: Select Router ID
    condition: params.router_id is set
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
