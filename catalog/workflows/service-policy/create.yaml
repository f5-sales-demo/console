schema: "urn:f5xc:console:workflow:v1"
id: "service-policy-create"
label: "Create Service Policy"
resource: "service-policy"
operation: "create"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  name:
    required: true
    description: "Service policy name (lowercase alphanumeric and hyphens)"
    example: "my-service-policy"
  rule_action:
    required: true
    description: "Action for the first rule (Allow or Deny)"
    example: "Allow"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/namespace/{namespace}/security/service-policies"
    wait_for: "[data-testid='add-service-policy']"
    description: "Navigate to Service Policies list page"

  - id: "click-add"
    action: "click"
    selector: "[data-testid='add-service-policy']"
    wait_for: "input[data-testid='name-input']"
    description: "Click Add Service Policy button to open the create form"

  - id: "fill-name"
    action: "fill"
    selector: "input[data-testid='name-input']"
    value: "{name}"
    description: "Enter the service policy name"

  - id: "add-rule"
    action: "click"
    selector: "[data-testid='add-rule']"
    wait_for: "[data-testid='rule-action-select']"
    description: "Open the rule entry form"
    then:
      - id: "select-action"
        action: "select"
        selector: "[data-testid='rule-action-select']"
        value: "{rule_action}"
        description: "Select the rule action (Allow or Deny)"

      - id: "apply-rule"
        action: "click"
        selector: "[data-testid='apply-btn']"
        wait_for: "[data-testid='rule-row']"
        description: "Confirm the rule entry"

  - id: "save"
    action: "click"
    selector: "[data-testid='save-and-exit']"
    wait_for: "[data-testid='resource-detail']"
    wait_timeout_ms: 30000
    description: "Save the service policy and wait for the detail page"

  - id: "verify-created"
    action: "assert"
    selector: "[data-testid='resource-name']"
    expected_text: "{name}"
    description: "Verify the resource was created by checking the name on the detail page"

postconditions:
  - "resource_detail_page_visible"
  - "resource_name_matches: {name}"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 30
  notes: "Selectors are placeholders — must be validated against the live console"
