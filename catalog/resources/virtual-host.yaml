schema: "urn:f5xc:console:resource:v1"
id: "virtual-host"
label: "Virtual Host"

api:
  kind: "virtual_host"
  group: "ves.io.schema"
  version: "v1"
  api_spec_file: "docs-cloud-f5-com.public.ves.io.schema.virtual_host.ves-swagger.json"
  crud_endpoints:
    create: "POST /api/config/namespaces/{namespace}/virtual_hosts"
    read: "GET /api/config/namespaces/{namespace}/virtual_hosts/{name}"
    update: "PUT /api/config/namespaces/{namespace}/virtual_hosts/{name}"
    delete: "DELETE /api/config/namespaces/{namespace}/virtual_hosts/{name}"
    list: "GET /api/config/namespaces/{namespace}/virtual_hosts"

console:
  list_route: "routes/load-balancers/virtual-hosts.yaml"
  detail_route_pattern: "/web/namespace/{namespace}/load-balancers/virtual-hosts/{name}"
  create_route_pattern: "/web/namespace/{namespace}/load-balancers/virtual-hosts/create"

  navigation:
    menu_path: ["Manage", "Load Balancers", "Virtual Hosts"]
    product_area: "load-balancers"

workflows:
  create: "workflows/virtual-host/create.yaml"
  delete: "workflows/virtual-host/delete.yaml"

form:
  sections:
    - id: "metadata"
      label: "Metadata"
      fields:
        - id: "name"
          label: "Name"
          type: "text"
          required: true
          api_field: "metadata.name"
          validation:
            pattern: "^[a-z][a-z0-9-]*$"
            max_length: 64
        - id: "description"
          label: "Description"
          type: "textarea"
          required: false
          api_field: "metadata.description"
        - id: "labels"
          label: "Labels"
          type: "key-value-pairs"
          required: false
          api_field: "metadata.labels"

    - id: "domains"
      label: "Domains"
      fields:
        - id: "domains"
          label: "Domains"
          type: "string-list"
          required: true
          api_field: "spec.domains"
          description: "Domain names this virtual host serves"

    - id: "routes"
      label: "Routes"
      type: "nested-resource-list"
      description: "HTTP routes for this virtual host"
      fields:
        - id: "route"
          label: "Route"
          type: "resource-selector"
          resource_type: "route-object"
          required: false
          api_field: "spec.routes[].ref"
          description: "Reference to a route object"

    - id: "tls"
      label: "TLS Configuration"
      collapsible: true
      initially_collapsed: false
      fields:
        - id: "tls_type"
          label: "TLS Type"
          type: "select"
          required: false
          options:
            - "No TLS"
            - "TLS with Automatic Certificate"
            - "TLS with Custom Certificate"
          api_field: "spec.tls_parameters"
          description: "TLS termination configuration"

    - id: "proxy"
      label: "Proxy Settings"
      collapsible: true
      initially_collapsed: true
      fields:
        - id: "proxy_type"
          label: "Proxy Type"
          type: "select"
          required: false
          options:
            - "HTTP"
            - "HTTPS"
          api_field: "spec.proxy_type"
          description: "Type of proxy for this virtual host"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Form sections and fields are draft — will be validated via browser-first discovery"
