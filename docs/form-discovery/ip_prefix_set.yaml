resource: ip_prefix_set
workspace: web-app-and-api-protection
route: /namespaces/{namespace}/manage/shared_objects/ip_prefix_sets
add_action: tab "Add IP Prefix Set"
discovered_at: "2026-06-17"
form_tabs:
  - Form
  - Documentation
  - JSON
footer_buttons:
  - Cancel All
  - Add IP prefix set

sections:
  - id: metadata
    label: Metadata
    fields:
      - name: Name
        widget: textbox
        required: true
      - name: Labels
        widget: label-adder
        action: Add Label
      - name: Description
        widget: textbox

  - id: ipv4-prefixes
    label: IPv4 Prefixes
    fields:
      - name: IPv4 Prefix
        widget: table
        items: 0
        columns:
          - "*IPv4 Prefix"
          - Description
          - Actions
        add_action: Add Item
        note: "Each row has an IPv4 CIDR prefix and optional description"

  - id: ipv6-prefixes
    label: IPv6 Prefixes
    fields:
      - name: IPv6 Prefix
        widget: table
        items: 0
        columns:
          - "*IPv6 Prefix"
          - Description
          - Actions
        add_action: Add Item
        note: "Each row has an IPv6 CIDR prefix and optional description"

summary:
  section_count: 3
  field_count: 5
  table_count: 2
