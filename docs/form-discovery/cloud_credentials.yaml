resource: cloud_credentials
workspace: multi-cloud-network-connect
route: /manage/site_management/other_configs/cloud_credential
namespace_scoped: false
add_action: tab "Add Cloud Credentials"
discovered_at: "2026-06-17"
form_tabs:
  - Form
  - Documentation
  - JSON
footer_buttons:
  - Cancel All
  - Add Cloud Credentials

sections:
  - id: metadata
    label: Metadata
    fields:
      - name: Name
        widget: textbox
        required: true
      - name: Labels
        widget: label-adder
        action: Add Label
      - name: Description
        widget: textbox

  - id: cloud-credentials
    label: Cloud Credentials
    has_advanced_toggle: true
    fields:
      - name: Select Cloud Credential Type
        widget: listbox
        required: true
        default: "AWS Programmatic Access Credentials"
        note: >
          Dynamic form — fields change based on selection. Options include:
          AWS Programmatic Access Credentials, AWS Role-based Access,
          Azure Client Secret, GCP Credentials File, etc.
      - name: Access Key ID
        widget: textbox
        required: true
        conditional: "Cloud Credential Type = AWS Programmatic Access Credentials"
        note: "AWS-specific field. Appears when AWS type is selected."
      - name: Secret Access Key
        widget: configure-link
        required: true
        state: "Not configured"
        action: "Configure"
        conditional: "Cloud Credential Type = AWS Programmatic Access Credentials"
        note: "Secret reference — opens nested form to enter or reference the AWS secret access key"

summary:
  section_count: 2
  field_count: 6
  listbox_count: 1
  nested_form_count: 1
  has_advanced_toggle: true
  dynamic_form: true
  note: >
    Form fields change dynamically based on Cloud Credential Type selection.
    AWS shows Access Key ID + Secret Access Key. Azure shows Client ID +
    Client Secret + Tenant ID + Subscription ID. GCP shows Credentials File
    upload. Each type has a completely different set of fields.
