resource: alert_receiver
workspace: web-app-and-api-protection
route: /namespaces/{namespace}/manage/alert_config/alert_receivers
add_action: tab "Add Alert Receiver"
discovered_at: "2026-06-17"
form_tabs:
  - Form
  - Documentation
  - JSON
footer_buttons:
  - Cancel All
  - Add Alert receiver

sections:
  - id: metadata
    label: Metadata
    fields:
      - name: Name
        widget: textbox
        required: true
      - name: Labels
        widget: label-adder
        action: Add Label
      - name: Description
        widget: textbox

  - id: receiver
    label: Receiver
    fields:
      - name: Receiver Type
        widget: listbox
        required: true
        default: "Slack"
        note: "Options: Slack, PagerDuty, OpsGenie, Email, SMS, Webhook, etc."
      - name: Webhook URL
        widget: configure-link
        required: true
        state: "Not configured"
        action: "Configure"
        note: "Secret reference — configures the webhook URL or API key for the selected receiver type"
      - name: Channel
        widget: textbox
        required: true
        note: "Slack channel name (e.g., #alerts). Changes based on receiver type selection."

summary:
  section_count: 2
  field_count: 6
  listbox_count: 1
  nested_form_count: 1
  note: "Form fields change dynamically based on Receiver Type selection. Slack shows Channel + Webhook URL. Other types show different fields."
